name: ESP32 PlatformIO CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Lấy mã nguồn từ repo về máy ảo
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Cài đặt Python (PlatformIO chạy trên nền Python)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Cài đặt PlatformIO Core
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    # 4. Tự động chạy lệnh biên dịch dự án
    - name: Run PlatformIO Build
      run: pio run
# gom file FW.bin , đổi tên cho dễ dàng quản lý
    - name: Prepare Artifact
      run: |
        mkdir -p release_files
        cp .pio/build/*/firmware.bin release_files/esp32_rtc_firmware.bin
        # Tự động tạo Release trên GitHub và đính kèm file .bin (Chỉ chạy khi bạn tạo TAG)
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: release_files/esp32_rtc_firmware.bin
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref }}
        body: |
          Bản cập nhật tự động cho dự án RTC ESP32.
          - File đính kèm: `esp32_rtc_firmware.bin`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}