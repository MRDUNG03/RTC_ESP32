name: ESP32 PlatformIO CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Lấy mã nguồn từ repo về máy ảo
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Cài đặt Python (PlatformIO chạy trên nền Python)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Cài đặt PlatformIO Core
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    # 4. Tự động chạy lệnh biên dịch dự án
    - name: Run PlatformIO Build
      run: pio run
